repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest
        entry: python -m pytest tests/test_smoke.py tests/test_async_smoke.py -q
        language: system
        pass_filenames: false
        always_run: true

      - id: typing-check
        name: typing check
        entry: python scripts/check_typing.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
